    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>
        body {

            font-family: 'serif';
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }
        #terminal {
            width: 80%;

            padding: 40px;
            border: 1px solid #333;
            background: rgba(20, 20, 20, 0.8);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border-radius: 8px;
        }
        .cursor {
            display: inline-block;
            width: 10px;
            background-color: #d4af37;
            margin-left: 5px;
            animation: blink 1s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        h1 { color: #d4af37; font-style: italic; font-weight: normal; }
        p { line-height: 1.8; font-size: 1.1rem; white-space: pre-wrap; }
        button {
            background: none;
            border: 1px solid #d4af37;
            color: #d4af37;
            padding: 10px 20px;
            cursor: pointer;
            font-family: inherit;
            transition: 0.3s;
        }
        button:hover { background: #d4af37; color: #000; }
    </style>
</head>
<body>

    <div id="terminal">
        <div id="setup">
            <h1>Authorized Access Required</h1>

            <input type="password" id="pass" style="background:#222; color:#fff; border:1px solid #444; padding:5px;">

        <div id="message" style="display:none;">

        function checkPass() {

</body>
</html>
